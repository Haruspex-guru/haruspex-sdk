name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @haruspex-guru-sdk/sdk build
      - run: pnpm --filter @haruspex-guru-sdk/mcp-server build
      # npm trusted publishing: OIDC handles auth via id-token: write +
      # the trusted publisher configured on each package on npmjs.com.
      # We use `npm publish` directly (not `pnpm publish`) because pnpm's
      # publish flow doesn't currently surface the OIDC token to the npm
      # registry; npm publish does the right thing automatically when
      # id-token: write is granted.
      - name: Publish @haruspex-guru-sdk/sdk
        working-directory: packages/js
        run: npm publish --provenance --access public
      - name: Publish @haruspex-guru-sdk/mcp-server
        working-directory: packages/mcp
        run: npm publish --provenance --access public

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist
