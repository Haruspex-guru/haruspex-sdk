name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  js:
    name: "@haruspex/sdk (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @haruspex/sdk lint
      - run: pnpm --filter @haruspex/sdk build
      - run: pnpm --filter @haruspex/sdk test

  mcp:
    name: "@haruspex/mcp-server (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @haruspex/sdk build
      - run: pnpm --filter @haruspex/mcp-server lint
      - run: pnpm --filter @haruspex/mcp-server build
      - run: pnpm --filter @haruspex/mcp-server test

  python:
    name: "haruspex-sdk (Python ${{ matrix.python }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: packages/python/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
