[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "haruspex-sdk"
version = "0.1.0"
description = "Official Haruspex SDK. Stock intelligence scores (0-100) across 16 dimensions."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Haruspex", email = "support@haruspex.guru" }]
keywords = ["haruspex", "stocks", "finance", "intelligence", "scoring", "sdk", "api"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.21.0",
    "ruff>=0.6.0",
    "mypy>=1.10.0",
]

[project.urls]
Homepage = "https://haruspex.guru"
Repository = "https://github.com/Haruspex-guru/haruspex-sdk"
Documentation = "https://github.com/Haruspex-guru/haruspex-sdk#readme"
Issues = "https://github.com/Haruspex-guru/haruspex-sdk/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/haruspex"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.9"
strict = true
